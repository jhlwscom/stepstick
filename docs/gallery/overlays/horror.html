<!DOCTYPE html>
<!--
  Analog Nightmare Tracker (Accessible Edit)
  ════════════════════════════════════
  A visceral, CRT-themed horror overlay with reined-in
  visual noise for better stream readability.
-->
<html>

<head>
    <meta charset="UTF-8">

    <!-- GOOGLE FONTS: VT323 for that jagged, retro terminal aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link id="gfont" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap">

    <!-- META BLOCK -->
    <script id="stepstick-meta" type="application/json">
  {
    "name":        "Analog Nightmare",
    "description": "A visceral, glitchy CRT telemetry tracker (Accessible Edit).",
    "author":      "Gemini",
    "authorUrl":   "https://gemini.google.com"
  }
  </script>

    <!-- SCHEMA BLOCK -->
    <script id="stepstick-schema" type="application/json">
  [
    { "key": "bgColor",       "label": "The Void (BG)",        "type": "color",    "default": "#050000" },
    { "key": "textColor",     "label": "Terminal Text",        "type": "color",    "default": "#d9d9d9" },
    { "key": "accentColor",   "label": "Fresh Blood",          "type": "color",    "default": "#ff003c" },
    { "key": "dangerColor",   "label": "Visceral Glow",        "type": "color",    "default": "#8b0000" },
    { "key": "showScanlines", "label": "CRT Distortion",       "type": "checkbox", "default": true },
    { "key": "fontFamily",    "label": "Font",                 "type": "font",     "default": "VT323" },
    { "key": "iconStill",     "label": "Watching Icon",        "type": "icon",     "default": "👁️" },
    { "key": "iconWalk",      "label": "Lurking Icon",         "type": "icon",     "default": "🤫" },
    { "key": "iconRun",       "label": "Pumping Icon",         "type": "icon",     "default": "🫀" }
  ]
  </script>

    <!-- CONFIG BLOCK -->
    <script id="stepstick-config" type="application/json">{}</script>

    <!-- STEPSTICK SDK -->
    <script src="https://jhlwscom.github.io/stepstick/stepstick.js"></script>

    <style>
        /* CSS VARIABLES */
        :root {
            --bg: #050000;
            --text: #d9d9d9;
            --accent: #ff003c;
            --danger: #8b0000;
        }

        html {
            font-size: 4vw;
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'VT323', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
            color: var(--text);
        }

        /* WIDGET CONTAINER - CRT Monitor Casing */
        .widget {
            position: relative;
            display: inline-flex;
            flex-direction: row;
            align-items: center;
            background: var(--bg);
            padding: 1.25rem 2rem;
            gap: 1.5rem;
            border: 0.2rem solid #222;
            border-radius: 1rem;
            box-shadow:
                inset 0 0 1.5rem rgba(0, 0, 0, 0.9),
                0 0 1rem var(--danger);
            overflow: hidden;
            transition: box-shadow 0.5s ease;
        }

        /* CRT SCANLINES & VIGNETTE */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 0.35rem, 3px 100%;
            pointer-events: none;
            z-index: 10;
            box-shadow: inset 0 0 1.5rem rgba(0, 0, 0, 0.8);
        }

        /* HUD METRICS & LAYOUT */
        .metric {
            display: flex;
            flex-direction: column;
            z-index: 2;
            position: relative;
        }

        .hud-title {
            font-size: 1rem;
            color: var(--danger);
            margin-bottom: 0.1rem;
            text-transform: uppercase;
            /* Subdued chromatic aberration for readability */
            text-shadow: 1px 0px 0px rgba(255, 0, 0, 0.4), -1px 0px 0px rgba(0, 0, 255, 0.4);
        }

        /* STEP COUNT WITH GLITCH FX */
        .step-value {
            font-size: 4rem;
            line-height: 0.8;
            color: var(--text);
            text-shadow: 0 0 0.25rem rgba(255, 255, 255, 0.2);
            min-width: 5ch;
        }

        .step-label {
            font-size: 1.25rem;
            color: var(--danger);
            text-transform: uppercase;
            margin-top: 0.5rem;
            border-top: 2px solid var(--danger);
            padding-top: 0.25rem;
            width: 100%;
            text-align: center;
        }

        /* DIVIDER */
        .divider {
            width: 0.2rem;
            height: 5rem;
            background: repeating-linear-gradient(0deg,
                    var(--danger),
                    var(--danger) 10px,
                    transparent 10px,
                    transparent 20px);
            opacity: 0.6;
            z-index: 2;
        }

        /* ACTIVITY STATUS AREA */
        .status-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 5rem;
            z-index: 2;
        }

        .activity-text {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .activity-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 3.5rem;
            height: 3.5rem;
            font-size: 3rem;
            line-height: 1;
            opacity: 0.5;
            filter: grayscale(100%);
            transition: filter 0.3s ease, opacity 0.3s ease;
        }

        .activity-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* DYNAMIC STATES */
        .state-standby .activity-text {
            color: var(--text);
            opacity: 0.5;
        }

        .state-walk .activity-text {
            color: var(--accent);
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.8);
        }

        .state-walk .activity-icon {
            opacity: 1;
            filter: drop-shadow(0 0 0.5rem var(--accent));
        }

        .state-run .activity-text {
            color: var(--accent);
            animation: glitch-text 0.2s infinite;
        }

        .state-run .activity-icon {
            opacity: 1;
            filter: drop-shadow(0 0 1rem var(--accent));
            animation: heartbeat 0.8s infinite;
        }

        .state-run.widget {
            box-shadow: inset 0 0 1.5rem rgba(255, 0, 60, 0.2), 0 0 1.5rem var(--accent);
            border-color: var(--danger);
        }

        /* BATTERY WARNING - VCR ERROR STYLE */
        .battery-warn {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            color: white;
            background: blue;
            padding: 0.5rem 1rem;
            white-space: nowrap;
            z-index: 20;
            width: 100%;
            text-align: center;
            /* Slowed down for accessibility */
            animation: vcr-tracking 0.3s infinite;
        }

        .battery-warn.visible {
            display: block;
        }

        /* KEYFRAMES */
        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.1);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.1);
            }
        }

        /* Reined-in glitch offset so numbers stay legible */
        @keyframes glitch-text {
            0% {
                transform: translate(0);
                text-shadow: -1px 0 rgba(255, 0, 60, 0.6), 1px 0 rgba(255, 255, 255, 0.4);
            }

            20% {
                transform: translate(-1px, 0.5px);
                text-shadow: 1px 0 rgba(255, 0, 60, 0.6), -1px 0 rgba(255, 255, 255, 0.4);
            }

            40% {
                transform: translate(-0.5px, -0.5px);
                text-shadow: -1px 0 rgba(255, 0, 60, 0.6), 1px 0 rgba(255, 255, 255, 0.4);
            }

            60% {
                transform: translate(1px, 0.5px);
                text-shadow: 1px 0 rgba(255, 0, 60, 0.6), -1px 0 rgba(255, 255, 255, 0.4);
            }

            80% {
                transform: translate(0.5px, -0.5px);
                text-shadow: -1px 0 rgba(255, 0, 60, 0.6), 1px 0 rgba(255, 255, 255, 0.4);
            }

            100% {
                transform: translate(0);
                text-shadow: 1px 0 rgba(255, 0, 60, 0.6), -1px 0 rgba(255, 255, 255, 0.4);
            }
        }

        /* Tighter vertical bounce so it doesn't cause eye strain */
        @keyframes vcr-tracking {
            0% {
                transform: translate(-50%, calc(-50% - 1px));
            }

            50% {
                transform: translate(-50%, calc(-50% + 1px));
            }

            100% {
                transform: translate(-50%, calc(-50% - 1px));
            }
        }

        /* DISCONNECTED STATE */
        body.is-disconnected .widget {
            opacity: 0.5;
            filter: contrast(120%) sepia(80%) hue-rotate(-30deg);
            transition: all 1s steps(5);
        }

        body.is-connected .widget {
            opacity: 1;
            filter: none;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>

    <div class="widget state-standby" id="widget">
        <!-- CRT Scanlines -->
        <div class="scanlines" id="scanlines"></div>

        <!-- Step Count Panel -->
        <div class="metric">
            <div class="hud-title">REC // CH.04</div>
            <div class="step-value" id="steps">00000</div>
            <div class="step-label">SUBJECT_STEPS</div>
        </div>

        <div class="divider" id="divider"></div>

        <!-- Activity Status Panel -->
        <div class="status-area" id="activity-wrap">
            <div class="activity-text" id="activity-text">IDLE</div>
            <div class="activity-icon" id="activity">👁️</div>
        </div>

        <!-- VCR Battery Warning -->
        <div class="battery-warn" id="battery-warn">NO SIGNAL - LOW PWR</div>
    </div>

    <script>
        function bool(v, def) {
            if (v === undefined || v === null) return def !== undefined ? def : true;
            if (typeof v === 'boolean') return v;
            return v !== 'false' && v !== '0' && v !== '';
        }

        var overlay = new StepStick();
        var lastFont = '';

        function applyConfig() {
            var bg = overlay.config('bgColor') || '#050000';
            var text = overlay.config('textColor') || '#d9d9d9';
            var accent = overlay.config('accentColor') || '#ff003c';
            var danger = overlay.config('dangerColor') || '#8b0000';
            var font = overlay.config('fontFamily') || 'VT323';
            var scanOn = bool(overlay.config('showScanlines'), true);

            var root = document.documentElement;
            root.style.setProperty('--bg', bg);
            root.style.setProperty('--text', text);
            root.style.setProperty('--accent', accent);
            root.style.setProperty('--danger', danger);

            document.body.style.fontFamily = "'" + font + "', monospace";

            if (font !== lastFont) {
                lastFont = font;
                document.getElementById('gfont').href =
                    'https://fonts.googleapis.com/css2?family=' +
                    encodeURIComponent(font) + '&display=swap';
            }

            document.getElementById('scanlines').style.display = scanOn ? 'block' : 'none';
        }

        applyConfig();

        var ICON_KEYS = ['iconStill', 'iconWalk', 'iconRun'];
        var ICON_DEFAULTS = ['👁️', '🤫', '🫀'];
        var TEXT_STATES = ['IDLE', 'LURKING', 'PUMPING'];

        function resolveIcon(state) {
            var custom = (overlay.config(ICON_KEYS[state]) || '').trim();
            return custom || ICON_DEFAULTS[state];
        }

        function renderIcon(el, state) {
            var icon = resolveIcon(state);
            if (icon.startsWith('http')) {
                el.innerHTML = '<img src="' + icon + '" alt="">';
            } else {
                el.textContent = icon;
            }
        }

        var lastState = 0;

        overlay.on('config', function () {
            renderIcon(document.getElementById('activity'), lastState);
            applyConfig();
        });

        overlay.on('telemetry', function (data) {

            if (data.steps !== undefined) {
                document.getElementById('steps').textContent = String(data.steps).padStart(5, '0');

                // Minor, accessible glitch triggered on step update
                if (Math.random() > 0.8) {
                    var stepEl = document.getElementById('steps');
                    stepEl.style.animation = 'none';
                    void stepEl.offsetWidth; // trigger reflow
                    stepEl.style.animation = 'glitch-text 0.2s 1';
                }
            }

            if (data.state !== undefined) {
                lastState = data.state;

                var widget = document.getElementById('widget');
                widget.classList.remove('state-standby', 'state-walk', 'state-run');

                document.getElementById('activity-text').textContent = TEXT_STATES[data.state] || '???';

                var el = document.getElementById('activity');

                if (data.state === 0) {
                    widget.classList.add('state-standby');
                } else if (data.state === 1) {
                    widget.classList.add('state-walk');
                } else if (data.state === 2) {
                    widget.classList.add('state-run');
                }

                renderIcon(el, data.state);
            }

            if (data.battery !== undefined) {
                document.getElementById('battery-warn').classList.toggle('visible', data.battery <= 15);
            }

        });
    </script>
</body>

</html>
