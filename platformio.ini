[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Uncomment to enable overlay WebSocket debug logging in the browser console:
    ; -DOVERLAY_DEBUG
lib_deps =
    m5stack/M5Unified @ 0.2.15
    m5stack/M5PM1@1.0.6
    sparkfun/SparkFun BMI270 Arduino Library @ 1.0.3
    jnthas/Improv WiFi Library @ 0.0.4
    links2004/WebSockets @ 2.4.1