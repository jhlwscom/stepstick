name: Firmware Release

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "platformio.ini"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── CalVer: YYYY.M.PATCH ──────────────────────────────────────────────
      - name: Compute version
        id: ver
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          PREFIX="${YEAR}.${MONTH}"
          git fetch --tags
          LAST=$(git tag -l "${PREFIX}.*" \
            | sed "s/^${PREFIX}\.//" \
            | grep -E '^[0-9]+$' \
            | sort -n | tail -1)
          PATCH=$(( ${LAST:--1} + 1 ))
          VERSION="${PREFIX}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version ${VERSION}"

      # ── Python / PlatformIO ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install -r requirements.txt

      # ── Stamp version into firmware ───────────────────────────────────────
      - name: Stamp version.h
        run: |
          echo '#pragma once' > src/version.h
          echo '#define FIRMWARE_VERSION "${{ steps.ver.outputs.version }}"' >> src/version.h

      - name: Build firmware
        run: pio run -e m5stack-sticks3

      # ── Tag + GitHub Release ──────────────────────────────────────────────
      - name: Rename partition table binary
        run: cp .pio/build/m5stack-sticks3/partitions.bin .pio/build/m5stack-sticks3/partition-table.bin

      - name: Create git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          files: |
            .pio/build/m5stack-sticks3/bootloader.bin
            .pio/build/m5stack-sticks3/partition-table.bin
            .pio/build/m5stack-sticks3/firmware.bin

      # ── Update manifest with release download URLs ────────────────────────
      - name: Update manifest.json
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${VERSION}"
          jq --arg v "$VERSION" --arg base "$BASE" '
            .version = $v |
            .builds[0].parts[0].path = ($base + "/bootloader.bin") |
            .builds[0].parts[1].path = ($base + "/partition-table.bin") |
            .builds[0].parts[2].path = ($base + "/firmware.bin")
          ' docs/manifest.json > docs/manifest.tmp.json
          mv docs/manifest.tmp.json docs/manifest.json

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/manifest.json
          git diff --staged --quiet || \
            git commit -m "chore: update manifest to ${{ steps.ver.outputs.version }}" && \
            git push origin main
